server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # API proxy to indexer
    location /api/ {
        proxy_pass http://127.0.0.1:3030/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets from Astro build (hashed filenames, immutable)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files served directly by Nginx
    location = /robots.txt { try_files /robots.txt =404; }
    location = /favicon.svg { try_files /favicon.svg =404; }
    location = /llms.txt { try_files /llms.txt =404; }
    location = /llms-full.txt { try_files /llms-full.txt =404; }
    location = /sitemap-index.xml { try_files /sitemap-index.xml =404; }
    location = /sitemap-0.xml { try_files /sitemap-0.xml =404; }
    location = /rss.xml { try_files /rss.xml =404; }

    # Prerendered static pages (try file first, fallback to Astro SSR)
    location / {
        try_files $uri $uri/index.html @astro;
    }

    # Astro Node server for SSR pages (detail pages with dynamic params)
    location @astro {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache other static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
